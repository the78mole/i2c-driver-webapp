name: Release & Deploy

on:
  push:
    branches: [main]

# Only one deployment at a time; cancel any superseded run.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write   # create git tags + GitHub Releases
  pages: write      # deploy to GitHub Pages
  id-token: write   # OIDC token required by actions/deploy-pages

jobs:
  # ─── Job 1: build, screenshot, release ─────────────────────────────────────
  build:
    name: Build · Screenshot · Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}

    steps:
      - name: Checkout (full history required for semantic versioning)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute semantic version
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          # Trigger a MAJOR bump by including (MAJOR) in a commit message,
          # a MINOR bump with (MINOR); everything else bumps PATCH.
          major_pattern: "(MAJOR)"
          minor_pattern: "(MINOR)"
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: true

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Vite build (GH Pages base path)
        run: npm run build
        env:
          # Sets the <base href> so assets resolve correctly under the repo sub-path.
          BASE_PATH: /i2c-driver-webapp/

      # ── Playwright screenshot ──────────────────────────────────────────────
      - name: Install Playwright Chromium (browsers + OS deps)
        run: npx playwright install --with-deps chromium

      - name: Start Vite preview server (background)
        run: npx vite preview --port 4173 &
        env:
          BASE_PATH: /i2c-driver-webapp/

      - name: Wait for preview server to be ready
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:4173/i2c-driver-webapp/ > /dev/null && echo "Server ready." && break
            echo "Waiting… ($i)"
            sleep 1
          done

      - name: Take app screenshot (networkidle + 2 s settle)
        run: node screenshot.mjs app-screenshot.png

      # ── GitHub Release ─────────────────────────────────────────────────────
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.semver.outputs.version }}
          name: "v${{ steps.semver.outputs.version }}"
          generate_release_notes: true
          files: app-screenshot.png

      # ── Upload built site as Pages artifact ───────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  # ─── Job 2: deploy Pages ────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
